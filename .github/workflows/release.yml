name: Publish private package

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: '@aplanatic'
      - uses: Aplanatic/iserv-api/.github/actions/install-package@4dea17024dd258b5c8831d5f2fbdd86334295ec2
      - name: Check package version
        run: test "$(node -p "require('./package.json').version")" = "${GITHUB_REF_NAME#v}"
      - run: npm run check
      - name: Restore released API dependency
        run: npm pkg set 'dependencies.@aplanatic/iserv-api=^1.9.0'
      - run: npm publish --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
