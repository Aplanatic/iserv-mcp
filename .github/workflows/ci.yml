name: CI
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Authorize private API dependency
        run: git config --global 'url.https://x-access-token:${{ secrets.APLANATIC_REPO_TOKEN }}@github.com/.insteadOf' 'ssh://git@github.com/'
      - run: npm ci
      - run: npm run check
      - run: npm audit --audit-level=high
