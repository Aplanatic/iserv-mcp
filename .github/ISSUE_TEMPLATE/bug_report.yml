name: Sanitized bug report
description: Report an MCP problem without live instance or account data.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: >-
        Security vulnerabilities belong in private vulnerability reporting. Never paste
        real hostnames, identities, screenshots, HAR files, credentials, or MCP responses.
  - type: checkboxes
    id: safety
    attributes:
      label: Privacy checks
      options:
        - label: This is not a security vulnerability.
          required: true
        - label: All instance, account, and response data is synthetic or redacted.
          required: true
  - type: input
    id: version
    attributes:
      label: MCP version
      placeholder: 0.4.1
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal sanitized MCP request
      render: json
    validations:
      required: true
